<style>
:root{
  --azul:#1B4297; --azul-esc:#142f6b; --lav:#A6A8CE; --lav-cl:#eceaf5;
  --ink:#1c2533; --cinza:#6b7785; --linha:#e6e8f0; --bg:#f3f4f9;
  --ok:#1a8a4a; --vermelho:#d83a34; --branco:#fff;
  --shadow:0 2px 10px rgba(20,47,107,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);
  background:var(--bg);display:flex;flex-direction:column;min-height:100vh;overscroll-behavior-y:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit;font-size:16px}

/* ===== TOP BAR ===== */
.topbar{position:sticky;top:0;z-index:30;background:var(--azul);color:#fff;
  padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;display:flex;align-items:center;gap:10px;
  box-shadow:0 2px 8px rgba(20,47,107,.25)}
.logo{font-weight:800;letter-spacing:.5px;background:#fff;color:var(--azul);
  padding:3px 8px;border-radius:7px;font-size:15px}
.topbar .t{font-size:15px;font-weight:600;line-height:1.1}
.topbar .t small{display:block;font-weight:400;font-size:11px;opacity:.8}

/* ===== VIEWS ===== */
.view{flex:1;display:none;flex-direction:column;padding-bottom:78px}
.view.active{display:flex}
#viewPedido{padding-bottom:150px}

/* ===== SEARCH + CHIPS ===== */
.searchwrap{position:sticky;top:0;z-index:20;background:var(--bg);padding:12px 12px 6px}
.searchbox{display:flex;align-items:center;background:#fff;border:1px solid var(--linha);
  border-radius:12px;padding:0 12px;box-shadow:var(--shadow)}
.searchbox svg{flex:none}
.searchbox input{border:none;outline:none;padding:13px 8px;width:100%;background:none}
.clear{color:var(--cinza);font-size:20px;padding:0 4px;line-height:1}
.chips{display:flex;gap:8px;overflow-x:auto;padding:8px 12px 4px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;border:1px solid var(--lav);color:var(--azul);background:#fff;
  padding:7px 13px;border-radius:20px;font-size:13px;font-weight:600;white-space:nowrap}
.chip.on{background:var(--azul);color:#fff;border-color:var(--azul)}
.count{padding:2px 12px 8px;color:var(--cinza);font-size:12px}

/* ===== ITEM LIST ===== */
.list{padding:0 12px 12px;display:flex;flex-direction:column;gap:10px}
.card{background:#fff;border:1px solid var(--linha);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow)}
.card .desc{font-weight:600;font-size:14.5px;line-height:1.3}
.card .meta{display:flex;align-items:center;gap:8px;margin-top:7px;flex-wrap:wrap}
.cod{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;color:var(--cinza);
  background:var(--bg);padding:2px 7px;border-radius:6px}
.badge{font-size:10.5px;font-weight:700;color:#fff;padding:2px 8px;border-radius:20px;letter-spacing:.2px}
.adder{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:11px}
.stepper{display:flex;align-items:center;border:1px solid var(--lav);border-radius:10px;overflow:hidden}
.stepper button{width:38px;height:38px;font-size:20px;color:var(--azul);font-weight:700}
.stepper input{width:46px;text-align:center;border:none;border-left:1px solid var(--lav);
  border-right:1px solid var(--lav);height:38px;padding:0}
.unitsel{height:38px;border:1px solid var(--lav);border-radius:10px;padding:0 6px;color:var(--azul);font-weight:600;background:#fff}
.add{background:var(--azul);color:#fff;font-weight:700;padding:10px 16px;border-radius:10px;font-size:13.5px}
.add.in{background:var(--ok)}
.empty{text-align:center;color:var(--cinza);padding:50px 24px;font-size:14px}

/* ===== PEDIDO (header form) ===== */
.formwrap{padding:14px 14px 4px}
.formcard{background:#fff;border:1px solid var(--linha);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
.formcard h3{margin:0 0 10px;font-size:13px;color:var(--azul);text-transform:uppercase;letter-spacing:.5px}
.field{margin-bottom:11px}
.field label{display:block;font-size:12px;color:var(--cinza);margin-bottom:4px;font-weight:600}
.field input{width:100%;border:1px solid var(--linha);border-radius:10px;padding:11px 12px;outline:none;background:#fbfbfe}
.field input:focus{border-color:var(--azul);background:#fff}
.field.req label::after{content:" *";color:var(--vermelho)}
.row2{display:flex;gap:10px}.row2 .field{flex:1}

.sectiontitle{padding:16px 14px 6px;font-size:13px;color:var(--azul);font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center}
.sectiontitle .clearcart{font-size:12px;color:var(--vermelho);font-weight:600;text-transform:none;letter-spacing:0}
.preq{background:#fff;border:1px solid var(--linha);border-radius:12px;padding:11px 13px;margin:0 14px 9px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.preq .info{flex:1;min-width:0}
.preq .info .d{font-weight:600;font-size:13.5px;line-height:1.25}
.preq .info .c{font-family:ui-monospace,monospace;font-size:11px;color:var(--cinza);margin-top:2px}
.preq .qty{font-weight:800;color:var(--azul);font-size:15px;white-space:nowrap}
.preq .rm{color:var(--vermelho);font-size:22px;line-height:1;padding:2px 4px}
.totbar{padding:6px 16px 2px;color:var(--cinza);font-size:13px}

/* ===== BOTTOM EXPORT BAR ===== */
.exportbar{position:fixed;left:0;right:0;bottom:calc(env(safe-area-inset-bottom) + 53px);z-index:29;
  background:#fff;border-top:1px solid var(--linha);box-shadow:0 -3px 12px rgba(20,47,107,.07);
  padding:10px 14px;display:flex;gap:10px}
.exportbar button{flex:1;padding:14px;border-radius:12px;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;gap:7px}
.bx{background:var(--ok);color:#fff}
.bp{background:var(--vermelho);color:#fff}
.exportbar button:disabled{opacity:.45}

/* ===== TAB BAR ===== */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:30;background:#fff;border-top:1px solid var(--linha);
  display:flex;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;padding:9px 0 8px;text-align:center;color:var(--cinza);font-size:11px;font-weight:600;position:relative}
.tab.on{color:var(--azul)}
.tab .ic{font-size:21px;display:block;margin-bottom:1px;line-height:1}
.tab .dot{position:absolute;top:5px;left:50%;margin-left:6px;background:var(--vermelho);color:#fff;
  font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:9px;padding:0 4px;line-height:17px}

/* ===== TOAST ===== */
.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);
  background:var(--azul-esc);color:#fff;padding:11px 18px;border-radius:24px;font-size:13.5px;font-weight:600;
  opacity:0;pointer-events:none;transition:.25s;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.25);max-width:88%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.foot{text-align:center;color:#aab;font-size:11px;padding:14px 0 6px}

/* ===== PEDIDO DE COMPRA ===== */
.gotocompra{padding:0 14px 6px}
.btnCompra{width:100%;background:#fff;border:1.5px solid var(--azul);color:var(--azul);
  font-weight:700;padding:13px;border-radius:12px;font-size:14px;display:flex;align-items:center;
  justify-content:center;gap:8px;box-shadow:var(--shadow)}
#viewCompra{padding-bottom:150px}
.subhead{position:sticky;top:0;z-index:20;background:var(--bg);display:flex;align-items:center;gap:6px;padding:12px 10px 6px}
.backbtn{color:var(--azul);font-weight:700;font-size:15px;padding:6px 8px;display:flex;align-items:center;gap:3px}
.subtitle{font-weight:700;font-size:16px;color:var(--ink)}
.lineRow{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.lineRow .lnum{width:18px;text-align:center;color:var(--cinza);font-weight:700;font-size:13px;flex:none}
.lineRow .ldesc{flex:1;min-width:0;border:1px solid var(--linha);border-radius:9px;padding:11px;background:#fbfbfe;outline:none}
.lineRow .ldesc:focus{border-color:var(--azul);background:#fff}
.lineRow .lqtd{width:60px;flex:none;border:1px solid var(--linha);border-radius:9px;padding:11px 6px;text-align:center;background:#fbfbfe;outline:none}
.lineRow .lqtd:focus{border-color:var(--azul);background:#fff}
.addline{width:100%;border:1.5px dashed var(--lav);color:var(--azul);background:#fff;font-weight:600;padding:11px;border-radius:11px;font-size:13.5px;margin-top:2px}
</style>
</head>

    </div>
  </div>
  <div class="chips" id="chips"></div>
  <div class="count" id="contador"></div>
  <div class="list" id="lista"></div>
</section>

<!-- ===== VIEW: PEDIDO ===== -->
<section class="view" id="viewPedido">

    <div class="formcard">
      <h3>Dados da requisição</h3>
      <div class="field req"><label>Nº do Chamado em atendimento</label>
        <input id="fReq" inputmode="numeric" placeholder="Ex.: 4582"></div>
      <div class="row2">
        <div class="field"><label>Solicitante</label><input id="fSol" placeholder="Nome"></div>
        <div class="field"><label>Loja</label><input id="fLoja" placeholder="Ex.: D229"></div>
      </div>
      <div class="field"><label>Data</label><input id="fData" readonly tabindex="-1" style="color:var(--cinza);background:#f1f1f6"></div>
    </div>
  </div>

  <div class="gotocompra"><button class="btnCompra" id="btnCompra">🛒 Pedido de Compra · peça fora do estoque</button></div>

  <div class="sectiontitle">Itens do pedido <button class="clearcart" id="btnLimpar">Limpar</button></div>
  <div id="pedidoLista"></div>
  <div class="totbar" id="totbar"></div>

  <div class="foot" id="ver"></div>
</section>

<!-- ===== VIEW: PEDIDO DE COMPRA ===== -->
<section class="view" id="viewCompra">

    <span class="subtitle">Pedido de Compra</span>
  </div>
  <div class="formwrap">

      <div class="field req"><label>Nº do Chamado em atendimento</label>
        <input id="cReq" inputmode="numeric" placeholder="Ex.: 4582"></div>
      <div class="row2">
        <div class="field"><label>Solicitante</label><input id="cSol" placeholder="Nome"></div>
        <div class="field"><label>Loja</label><input id="cLoja" placeholder="Ex.: D229"></div>
      </div>
      <div class="field"><label>Data</label><input id="cData" readonly tabindex="-1" style="color:var(--cinza);background:#f1f1f6"></div>
    </div>
  </div>
  <div class="sectiontitle">Peças para compra</div>
  <div class="formwrap"><div class="formcard" id="linhasCompra"></div></div>
  <div style="padding:0 14px"><button class="addline" id="btnAddLinha">+ Adicionar linha</button></div>
  <div class="foot" id="verC"></div>
</section>

<!-- ===== EXPORT BAR (pedido de compra) ===== -->
<div class="exportbar" id="exportbarC" style="display:none">
  <button class="bx" id="btnXlsC">⬇ Excel</button>
  <button class="bp" id="btnPdfC">⬇ PDF</button>
</div>

<!-- ===== EXPORT BAR (requisição) ===== -->
<div class="exportbar" id="exportbar" style="display:none">
  <button class="bx" id="btnXls">⬇ Excel</button>

</div>

<!-- ===== TAB BAR ===== -->
<nav class="tabbar">
  <button class="tab on" id="tabItens"><span class="ic">🔍</span>Itens</button>
  <button class="tab" id="tabPedido"><span class="ic">📋</span>Pedido<span class="dot" id="dot" style="display:none">0</span></button>
</nav>

/* ===== PEDIDO DE COMPRA (estado) ===== */
const MIN_LINHAS=7;
let linhasCompra=[];
function escAttr(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function salvarCompra(){ try{
  localStorage.setItem('dma_compra_head', JSON.stringify({req:cReq.value,sol:cSol.value,loja:cLoja.value}));
  localStorage.setItem('dma_compra_lines', JSON.stringify(linhasCompra));
}catch(e){} }
function carregarCompra(){ try{
  const h=JSON.parse(localStorage.getItem('dma_compra_head')||'{}');
  if(h.req)cReq.value=h.req; if(h.sol)cSol.value=h.sol; if(h.loja)cLoja.value=h.loja;
  const l=JSON.parse(localStorage.getItem('dma_compra_lines')||'[]');
  linhasCompra=Array.isArray(l)?l:[];
}catch(e){ linhasCompra=[]; }
  while(linhasCompra.length<MIN_LINHAS) linhasCompra.push({desc:'',qtd:''});
}
function renderLinhas(){
  const c=$('linhasCompra');
  c.innerHTML=linhasCompra.map((l,i)=>`
    <div class="lineRow" data-i="${i}">
      <span class="lnum">${i+1}</span>
      <input class="ldesc" data-d placeholder="Descrição da peça" value="${escAttr(l.desc)}">
      <input class="lqtd" data-q type="number" min="1" inputmode="numeric" placeholder="Qtd" value="${escAttr(l.qtd)}">
    </div>`).join('');
  c.querySelectorAll('.lineRow').forEach(r=>{
    const i=+r.dataset.i;
    r.querySelector('[data-d]').oninput=e=>{linhasCompra[i].desc=e.target.value;salvarCompra();};
    r.querySelector('[data-q]').oninput=e=>{linhasCompra[i].qtd=e.target.value;salvarCompra();};
  });
}
$('btnAddLinha').onclick=()=>{linhasCompra.push({desc:'',qtd:''});renderLinhas();salvarCompra();};
[cReq,cSol,cLoja].forEach(f=>f.oninput=salvarCompra);

function dadosCompra(){
  return { req:(cReq.value||'').trim(), sol:(cSol.value||'').trim(), loja:(cLoja.value||'').trim(), data:HOJE,
    linhas: linhasCompra.filter(l=>(l.desc||'').trim()!=='').map(l=>({desc:l.desc.trim(), qtd:Math.max(1,parseInt(l.qtd)||1)})) };
}
function validarCompra(){
  if(!cReq.value.trim()){toast('Informe o nº do chamado');cReq.focus();return false;}
  if(!dadosCompra().linhas.length){toast('Preencha ao menos uma peça');return false;}
  return true;
}
function nomeCompra(ext){const p=dadosCompra();let n='PedidoCompra';if(p.req)n+='_'+p.req;if(p.loja)n+='_'+p.loja;return n.replace(/[^\w\-]+/g,'_')+'.'+ext;}

$('btnXlsC').onclick=async()=>{
  if(!validarCompra())return;
  if(typeof XLSX==='undefined'){ toast('Excel não carregou — verifique a internet e tente de novo'); return; }
  try{
    const p=dadosCompra();
    const aoa=[['PEDIDO DE COMPRA'],[],['Nº do chamado',p.req],['Solicitante',p.sol],['Loja',p.loja],['Data',p.data],[],['#','Descrição da peça','Qtde']];
    p.linhas.forEach((l,i)=>aoa.push([i+1,l.desc,l.qtd]));
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=[{wch:5},{wch:54},{wch:8}];
    ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:2}}];
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Pedido de Compra');
    const out=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const ok=await compartilhar(new Blob([out],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),nomeCompra('xlsx'),'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet');
    if(ok) limparCompra('Excel gerado · lista zerada');
  }catch(err){ toast('Erro ao gerar Excel: '+(err.message||err)); }
};
$('btnPdfC').onclick=async()=>{
  if(!validarCompra())return;
  if(!(window.jspdf&&window.jspdf.jsPDF)){ toast('PDF não carregou — verifique a internet e tente de novo'); return; }
  try{
  const p=dadosCompra();
  const {jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=doc.internal.pageSize.getWidth();
  doc.setFillColor(27,66,151);doc.rect(0,0,W,24,'F');
  doc.setTextColor(255);doc.setFont('helvetica','bold');doc.setFontSize(16);
  doc.text('DMA · Pedido de Compra',14,15);
  doc.setTextColor(30,37,51);doc.setFont('helvetica','normal');doc.setFontSize(11);
  let y=34;const linha=(l,v)=>{doc.setFont('helvetica','bold');doc.text(l+':',14,y);doc.setFont('helvetica','normal');doc.text(String(v||'—'),58,y);y+=7;};
  linha('Nº do chamado',p.req);linha('Solicitante',p.sol);linha('Loja',p.loja);linha('Data',p.data);
  doc.autoTable({startY:y+2,head:[['#','Descrição da peça','Qtde']],
    body:p.linhas.map((l,i)=>[i+1,l.desc,l.qtd]),
    styles:{fontSize:9.5,cellPadding:2.4,overflow:'linebreak'},
    headStyles:{fillColor:[27,66,151],textColor:255,fontStyle:'bold'},
    alternateRowStyles:{fillColor:[243,244,249]},
    columnStyles:{0:{cellWidth:10,halign:'center'},2:{cellWidth:18,halign:'center'}},
    margin:{left:14,right:14}});
  let fy=doc.lastAutoTable.finalY+8;
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.text('Total de peças: '+p.linhas.length,14,fy);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(150);
  doc.text('Gerado pelo app DMA Requisições — '+new Date().toLocaleString('pt-BR'),14,287);
  const ok=await compartilhar(doc.output('blob'),nomeCompra('pdf'),'application/pdf');
  if(ok) limparCompra('PDF gerado · lista zerada');
  }catch(err){ toast('Erro ao gerar PDF: '+(err.message||err)); }
};

/* ===== CHIPS ===== */
function renderChips(){
  const arr=["TODOS",...setores];
  chips.innerHTML=arr.map(s=>{
    const lbl=s==="TODOS"?"Todos":s;
    return `<button class="chip ${s===filtroSetor?'on':''}" data-s="${s}">${lbl}</button>`;
  }).join('');
  chips.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{filtroSetor=c.dataset.s;renderChips();renderLista();});
}

/* ===== LISTA ===== */
function norm(s){return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function filtrar(){
  const t=norm(termo);
  return DADOS.filter(d=>{
    if(filtroSetor!=="TODOS" && d.setor!==filtroSetor) return false;
    if(!t) return true;
    return norm(d.item).includes(t) || d.codigo.includes(termo.trim());
  });
}
function renderLista(){
  const res=filtrar();
  contador.textContent = res.length+" "+(res.length===1?"item":"itens");
  if(!res.length){ lista.innerHTML='<div class="empty">Nenhum item encontrado.<br>Tente outro termo ou setor.</div>'; return; }
  lista.innerHTML = res.slice(0,400).map(d=>{
    const inC=carrinho.get(d.codigo);
    const qv=inC?inC.qtd:0, uv=inC?inC.un:"UN";
    return `<div class="card" data-cod="${d.codigo}">
      <div class="desc">${esc(d.item)}</div>
      <div class="meta">
        <span class="cod">${d.codigo}</span>
        <span class="badge" style="background:${corSetor[d.setor]}">${d.setor}</span>
      </div>
      <div class="adder">
        <div class="stepper">
          <button data-a="minus">−</button>
          <input type="number" min="0" value="${qv}" data-q inputmode="numeric">
          <button data-a="plus">+</button>
        </div>
        <select class="unitsel" data-u>${UNS.map(u=>`<option ${u===uv?'selected':''}>${u}</option>`).join('')}</select>
        <button class="add ${inC?'in':''}" data-add>${inC?'✓ Na lista':'Adicionar'}</button>
      </div>
    </div>`;
  }).join('');
  if(res.length>400) lista.insertAdjacentHTML('beforeend','<div class="empty">Mostrando 400 de '+res.length+'. Refine a busca.</div>');
  ligarCards();
}
const UNS=["UN","PÇ","M","M²","KG","L","CX","PAR","RL","SC","GL"];
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function ligarCards(){
  lista.querySelectorAll('.card').forEach(card=>{
    const cod=card.dataset.cod;
    const qi=card.querySelector('[data-q]'), us=card.querySelector('[data-u]');
    card.querySelector('[data-a=minus]').onclick=()=>{qi.value=Math.max(0,(+qi.value||0)-1);sync();};
    card.querySelector('[data-a=plus]').onclick=()=>{qi.value=(+qi.value||0)+1;sync();};
    qi.oninput=sync; us.onchange=sync;
    function sync(){ if(carrinho.has(cod)){const e=carrinho.get(cod);e.qtd=Math.max(0,+qi.value||0);e.un=us.value;salvar();atualizaBadge();} }
    card.querySelector('[data-add]').onclick=(ev)=>{
      const d=DADOS.find(x=>x.codigo===cod);
      const q=parseInt(qi.value)||0, u=us.value;
      if(carrinho.has(cod)){ carrinho.delete(cod); ev.target.textContent='Adicionar'; ev.target.classList.remove('in'); toast('Removido do pedido'); }
      else { if(q<1){ toast('Use o + para definir a quantidade'); return; } carrinho.set(cod,{codigo:cod,item:d.item,setor:d.setor,qtd:q,un:u}); ev.target.textContent='✓ Na lista'; ev.target.classList.add('in'); toast('Adicionado ('+q+' '+u+')'); }
      salvar(); atualizaBadge();
    };
  });
}

/* ===== BADGE / PEDIDO ===== */
function atualizaBadge(){
  const n=carrinho.size;
  dot.style.display=n?'block':'none'; dot.textContent=n;
}
function renderPedido(){
  exportbar.style.display = carrinho.size?'flex':'none';
  if(!carrinho.size){
    pedidoLista.innerHTML='<div class="empty">Nenhum item no pedido.<br>Volte em <b>Itens</b> e adicione produtos.</div>';
    totbar.textContent=''; return;
  }
  const arr=[...carrinho.values()];
  pedidoLista.innerHTML=arr.map(e=>`
    <div class="preq" data-cod="${e.codigo}">
      <div class="info"><div class="d">${esc(e.item)}</div><div class="c">${e.codigo} · ${e.setor}</div></div>
      <span class="qty">${e.qtd} ${e.un}</span>
      <button class="rm" data-rm>&times;</button>
    </div>`).join('');
  pedidoLista.querySelectorAll('.preq').forEach(p=>{
    p.querySelector('[data-rm]').onclick=()=>{carrinho.delete(p.dataset.cod);salvar();atualizaBadge();renderPedido();renderLista();};
  });
  const totUn=arr.reduce((s,e)=>s+e.qtd,0);
  totbar.innerHTML=`<b>${arr.length}</b> itens · <b>${totUn}</b> unidades no total`;
}

function showView(v){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  $(v).classList.add('active');
  const it=v==='viewItens';
  $('tabItens').classList.toggle('on',it); $('tabPedido').classList.toggle('on',!it);
  $('exportbarC').style.display = (v==='viewCompra')?'flex':'none';
  if(v==='viewPedido'){ renderPedido(); }
  else { $('exportbar').style.display='none'; }
  window.scrollTo(0,0);
}
$('tabItens').onclick=()=>showView('viewItens');

$('btnLimpar').onclick=()=>{ if(!carrinho.size)return;
  if(confirm('Limpar todos os itens do pedido?')){carrinho.clear();salvar();atualizaBadge();renderPedido();renderLista();toast('Pedido limpo');} };
[fReq,fSol,fLoja].forEach(f=>f.oninput=salvar);

/* ===== TOAST ===== */
let tT;
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),1700);}

/* ===== EXPORT HELPERS ===== */
function dadosPedido(){
  return {
    req:(fReq.value||'').trim(), sol:(fSol.value||'').trim(),
    loja:(fLoja.value||'').trim(), data:HOJE,
    itens:[...carrinho.values()]
  };
}
function validar(){
  if(!carrinho.size){toast('Adicione itens ao pedido');showView('viewItens');return false;}
  if(!fReq.value.trim()){toast('Informe o nº do chamado');fReq.focus();return false;}
  return true;
}
function nomeArq(ext){
  const p=dadosPedido();
  let n='Requisicao';
  if(p.req)n+='_'+p.req;
  if(p.loja)n+='_'+p.loja;
  return n.replace(/[^\w\-]+/g,'_')+'.'+ext;
}
async function compartilhar(blob,nome,tipo){
  const file=new File([blob],nome,{type:tipo});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file],title:'DMA · Almoxarifado'}); return true; }
    catch(e){ if(e.name==='AbortError') return false; }
  }
  // fallback: download
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=nome;document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),4000);
  toast('Arquivo baixado — anexe no WhatsApp');
  return true;
}
function limparPedido(msg){ carrinho.clear(); fReq.value=''; fSol.value=''; fLoja.value=''; salvar(); atualizaBadge(); renderPedido(); renderLista(); if(msg)toast(msg); }
function limparCompra(msg){ linhasCompra=[]; while(linhasCompra.length<MIN_LINHAS) linhasCompra.push({desc:'',qtd:''}); cReq.value=''; cSol.value=''; cLoja.value=''; salvarCompra(); renderLinhas(); if(msg)toast(msg); }

/* ===== EXCEL ===== */
$('btnXls').onclick=async()=>{
  if(!validar())return;
  if(typeof XLSX==='undefined'){ toast('Excel não carregou — verifique a internet e tente de novo'); return; }
  try{
    const p=dadosPedido();
    const aoa=[
      ['REQUISIÇÃO DE ALMOXARIFADO'],
      [],
      ['Nº do chamado', p.req],
      ['Solicitante', p.sol],
      ['Loja', p.loja],
      ['Data', p.data],
      [],
      ['#','Código','Descrição','Setor','Qtde','Un.']
    ];
    p.itens.forEach((e,i)=>aoa.push([i+1,e.codigo,e.item,e.setor,e.qtd,e.un]));
    aoa.push([]);
    aoa.push(['','','','Total de itens',p.itens.length,'']);
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=[{wch:5},{wch:12},{wch:48},{wch:18},{wch:7},{wch:6}];
    ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:5}}];
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Requisição');
    const out=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const ok=await compartilhar(new Blob([out],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),
      nomeArq('xlsx'),'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet');
    if(ok) limparPedido('Excel gerado · lista zerada');
  }catch(err){ toast('Erro ao gerar Excel: '+(err.message||err)); }
};

/* ===== PDF ===== */
$('btnPdf').onclick=async()=>{
  if(!validar())return;
  if(!(window.jspdf&&window.jspdf.jsPDF)){ toast('PDF não carregou — verifique a internet e tente de novo'); return; }
  try{
  const p=dadosPedido();
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=doc.internal.pageSize.getWidth();
  // cabeçalho
  doc.setFillColor(27,66,151);doc.rect(0,0,W,24,'F');
  doc.setTextColor(255);doc.setFont('helvetica','bold');doc.setFontSize(16);
  doc.text('DMA · Requisição de Almoxarifado',14,15);
  doc.setTextColor(30,37,51);doc.setFont('helvetica','normal');doc.setFontSize(11);
  let y=34;
  const linha=(l,v)=>{doc.setFont('helvetica','bold');doc.text(l+':',14,y);
    doc.setFont('helvetica','normal');doc.text(String(v||'—'),58,y);y+=7;};
  linha('Nº do chamado',p.req);
  linha('Solicitante',p.sol);
  linha('Loja',p.loja);
  linha('Data',p.data);
  doc.autoTable({
    startY:y+2,
    head:[['#','Código','Descrição','Setor','Qtde','Un.']],
    body:p.itens.map((e,i)=>[i+1,e.codigo,e.item,e.setor,e.qtd,e.un]),
    styles:{fontSize:9,cellPadding:2.2,overflow:'linebreak'},
    headStyles:{fillColor:[27,66,151],textColor:255,fontStyle:'bold'},
    alternateRowStyles:{fillColor:[243,244,249]},
    columnStyles:{0:{cellWidth:9,halign:'center'},1:{cellWidth:22},3:{cellWidth:30},
      4:{cellWidth:14,halign:'center'},5:{cellWidth:12,halign:'center'}},
    margin:{left:14,right:14}
  });
  let fy=doc.lastAutoTable.finalY+8;
  doc.setFont('helvetica','bold');doc.setFontSize(10);
  doc.text('Total de itens: '+p.itens.length+'   ·   Unidades: '+p.itens.reduce((s,e)=>s+e.qtd,0),14,fy);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(150);
  doc.text('Gerado pelo app DMA Requisições — '+new Date().toLocaleString('pt-BR'),14,287);
  const blob=doc.output('blob');
  const ok=await compartilhar(blob,nomeArq('pdf'),'application/pdf');
  if(ok) limparPedido('PDF gerado · lista zerada');
  }catch(err){ toast('Erro ao gerar PDF: '+(err.message||err)); }
};
